name: luseepy-test
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

  # Enable manual activation, too
  workflow_dispatch:
jobs:
  luseepy-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ github.workspace }}
    env:
      PYTHONPATH: .:..
      LUSEE_DRIVE_DIR: Drive
      LUSEE_OUTPUT_DIR: ./output
      JAX_ENABLE_X64: "True"
      JAX_PLATFORMS: cpu
      JAX_LOG_COMPILES: "1"
      PYTHONFAULTHANDLER: "1"
      LUSEE_JAX_DEBUG: "1"
      LUSEE_JAX_DEBUG_HLO_CHARS: "2500"
      MPLCONFIGDIR: /tmp/matplotlib
      UV_CACHE_DIR: /tmp/uv-cache
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y curl wget gfortran build-essential pkg-config cmake libopenblas-dev libfftw3-dev
      - run: curl -LsSf https://astral.sh/uv/install.sh | env UV_NO_MODIFY_PATH=1 sh
      - run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - run: cp pyproject.toml.linux_no_cuda pyproject.toml
      - run: uv sync
      - run: wget "https://drive.google.com/uc?export=download&id=1PbU432IYAFSzOjWRrKMoGFR6F1M3dmaV" -O drive.tgz
      - run: tar zxvf drive.tgz
      - name: Print debug environment
        run: |
          python --version
          uv --version
          uname -a
          lscpu
          free -h
          grep -m1 '^flags' /proc/cpuinfo || true
          env | sort | grep -E '^(JAX|XLA|OMP|OPENBLAS|MKL|PYTHONFAULTHANDLER|LUSEE_|MPLCONFIGDIR|UV_CACHE_DIR|PYTHONPATH)=' || true
          uv run python - <<'PY'
          import platform
          import sys
          from importlib import metadata

          pkgs = [
              "jax",
              "jaxlib",
              "numpy",
              "scipy",
              "s2fft",
              "croissant-sim",
              "healpy",
              "astropy",
              "fitsio",
              "lunarsky",
              "pytest",
          ]
          print(f"python={sys.version}")
          print(f"platform={platform.platform()}")
          for pkg in pkgs:
              try:
                  print(f"{pkg}={metadata.version(pkg)}")
              except metadata.PackageNotFoundError:
                  print(f"{pkg}=<missing>")
          PY
      - name: Run failing lunar 28-day test with debug logs
        id: lunar_28day
        continue-on-error: true
        run: uv run pytest tests/test_lunar_28day_Cro_vs_default.py::test_lunar_day_28_single_source -vv -s
      - name: Print post-test diagnostics
        if: always()
        run: |
          echo "pytest outcome=${{ steps.lunar_28day.outcome }}"
          echo "pytest conclusion=${{ steps.lunar_28day.conclusion }}"
          find /tmp -maxdepth 2 \( -type d -o -type f \) | grep -E '/(jax|xla)' | sort || true
      - name: Fail workflow if debug test failed
        if: steps.lunar_28day.outcome != 'success'
        run: exit 1
