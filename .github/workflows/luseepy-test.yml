name: luseepy-test
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

  # Enable manual activation, too
  workflow_dispatch:
jobs:
  luseepy-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ github.workspace }}
    env:
      PYTHONPATH: .:..
      LUSEE_DRIVE_DIR: Drive
      LUSEE_OUTPUT_DIR: ./output
      JAX_ENABLE_X64: "True"
      MPLCONFIGDIR: /tmp/matplotlib
      UV_CACHE_DIR: /tmp/uv-cache
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y curl wget gfortran build-essential pkg-config cmake libopenblas-dev libfftw3-dev
      - run: curl -LsSf https://astral.sh/uv/install.sh | env UV_NO_MODIFY_PATH=1 sh
      - run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - run: uv sync
      - run: wget "https://drive.google.com/uc?export=download&id=1PbU432IYAFSzOjWRrKMoGFR6F1M3dmaV" -O drive.tgz
      - run: tar zxvf drive.tgz
      - run: uv run pytest tests/ -v
      - run: cd simulation; ln -s ../Drive .; mkdir -p output; uv run python driver/run_sim.py config/example.yaml; ls -l output
      - run: uv run python tests/SimReadTest.py simulation/output/sim_example.fits
