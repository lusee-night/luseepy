paths:
  lusee_drive_dir: $LUSEE_DRIVE_DIR
  sky_dir: Simulations/SkyModels
  beam_dir: Simulations/BeamModels/LanderRegolithComparison/eight_layer_regolith/
  output_dir: $LUSEE_OUTPUT_DIR
    
sky:
  file: ULSA_32_ddi_smooth.fits

beam_config:
  type: fits
  default_file: hfss_lbl_3m_75deg.fits
  common_beam_angle: 0
  couplings:
    opposite:
      combinations: [[N,S], [E,W]]
      two_port: hfss_lbl_3m_75deg.2port.fits 
      sign: -1
  
beams: 
  N:
    angle: 0
  E:
    angle: -90
  S:
    angle: -180
  W:
    angle: -270

observation:
  long: 180
  lat: -10
  beams: [ N, S, E, W ]
  lunar_day: "2025-02-01 13:00:00 to 2025-02-28 13:00:00"
  dt: 3600 
  Tground: 0
  lmax: 32
  combinations: all
  freq:
    start_idx: 0
    stop_idx: 50
    step_idx: 1

simulation:
  engine: croissant 
  # output defaults to sim_{engine}_output.fits (this is specified in the driver/run_Cro_sim.py file)
  cache_transform: lunar_day.pickle  
  # JAX-only option. Ignored unless simulation.engine is topo.
  time_batch_size: 300
  plot_sky_and_beam: True
  freq_idx_plot: 25
  plot_dir: simulation/output/figures
  plot_filename: sim_croissant_output.png
  
