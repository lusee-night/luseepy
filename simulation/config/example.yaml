# Starter config aligned with sim_choice_realistic.yaml / run_Cro_sim.py pipeline.
# Engine: croissant (requires croissant-sim + s2fft + spiceypy; see pyproject optional deps).
paths:
  lusee_drive_dir: $LUSEE_DRIVE_DIR
  sky_dir: Simulations/SkyModels
  beam_dir: Simulations/BeamModels/LanderRegolithComparison/eight_layer_regolith/
  output_dir: $LUSEE_OUTPUT_DIR
    
sky:
  file: ULSA_32_ddi_smooth.fits

beam_config:
  type: fits
  default_file: hfss_lbl_3m_75deg.fits
  common_beam_angle: 0
  couplings:
    opposite:
      combinations: [[N,S], [E,W]]
      # following is to save CI DL: we should have a 2 port here,
      # but use this to have CI run through this part of the code
      two_port: hfss_lbl_3m_75deg.fits 
      sign: -1
  
beams: 
  N:
    angle: 0
  E:
    angle: -90
  S:
    angle: -180
  W:
    angle: -270

observation:
  long: 180
  lat: -10
  beams: [ N, S, E, W ]
  lunar_day: "2025-02-01 13:00:00 to 2025-02-28 13:00:00"
  dt: 3600
  Tground: 0
  lmax: 32
  combinations: all
  freq:
    start_idx: 0
    stop_idx: 5
    step_idx: 4

simulation:
  engine: croissant
  # CI and SimReadTest expect this filename; sim_choice_realistic omits output
  # and uses the driver default name instead.
  output: sim_example.fits
  cache_transform: lunar_day.pickle
  # JAX-only option. Ignored unless simulation.engine is topo.
  time_batch_size: 300
  plot_sky_and_beam: true
  # Must satisfy 0 <= freq_idx_plot < number of frequency bins (see observation.freq).
  freq_idx_plot: 0
  plot_dir: simulation/output/figures
  plot_filename: sim_example_sky_beam.png
